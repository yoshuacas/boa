<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOA Dashboard — Functions (Lambda)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content" id="pageContent"></main>
    </div>
  </div>

  <script src="js/dashboard-core.js"></script>
  <script src="js/aws-cli-bridge.js"></script>
  <script>
    BOA.init({
      activePage: 'functions',
      pageTitle: 'Functions (Lambda)',
      onConfig: renderFunctions,
    });

    function renderFunctions(cfg) {
      const el = document.getElementById('pageContent');

      if (!cfg) {
        BOA.renderGettingStarted(el);
        return;
      }

      const fnName = CLIBridge.getLambdaName(cfg);
      const region = BOA.getRegion();

      if (!fnName) {
        el.innerHTML = `
          <div class="page-header">
            <h1>Functions (Lambda)</h1>
            <p>No Lambda function found in your config.</p>
          </div>
          <div class="callout callout-warning">
            <p>
              Your <code>.boa/config.json</code> does not include a Lambda function name.
              Make sure your bootstrap has completed and the config contains a
              <strong>lambda_function_name</strong> or <strong>lambda.functionName</strong> field.
            </p>
          </div>
        `;
        return;
      }

      const commands = CLIBridge.getLambdaCommands(cfg);

      el.innerHTML = `
        <div class="page-header">
          <h1>Functions (Lambda)</h1>
          <p>AWS Lambda &mdash; Serverless compute for your business logic</p>
        </div>

        <!-- Hero card -->
        <div class="detail-hero">
          <div class="detail-service">AWS Lambda</div>
          <div class="detail-title">${BOA.escapeHtml(fnName)}</div>
          <div class="detail-info">
            <div>
              <div class="info-row">
                <span class="info-label">Function name</span>
                <span class="info-value">${BOA.escapeHtml(fnName)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Region</span>
                <span class="info-value">${BOA.escapeHtml(region)}</span>
              </div>
            </div>
            <div>
              <div class="info-row">
                <span class="info-label">Log group</span>
                <span class="info-value">/aws/lambda/${BOA.escapeHtml(fnName)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Runtime</span>
                <span class="info-value">${BOA.escapeHtml(cfg.lambda_runtime || cfg.lambda?.runtime || 'nodejs20.x')}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Commands -->
        <div class="section-header">
          <span class="section-icon">\u03BB</span>
          <h2>Lambda Commands</h2>
        </div>
        <div class="command-list">
          ${commands.map(c => BOA.commandBlockHtml(c)).join('')}
        </div>

        <!-- Tip -->
        <div class="callout">
          <p>
            <strong>Note:</strong> Lambda functions in BOA are triggered by API Gateway.
            You can also invoke them directly using the <em>Invoke the function</em> command
            above with a test payload. The <code>--cli-binary-format raw-in-base64-out</code>
            flag lets you pass JSON directly without base64 encoding.
          </p>
        </div>
      `;
    }
  </script>
</body>
</html>
