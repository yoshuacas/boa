<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOA Dashboard — Stack Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content" id="pageContent">
        <!-- Populated by JS -->
      </main>
    </div>
  </div>

  <script src="js/dashboard-core.js"></script>
  <script src="js/aws-cli-bridge.js"></script>
  <script>
    BOA.init({
      activePage: 'overview',
      pageTitle: 'Stack Overview',
      onConfig: renderOverview,
    });

    function renderOverview(cfg) {
      const el = document.getElementById('pageContent');

      if (!cfg) {
        BOA.renderGettingStarted(el);
        return;
      }

      const region = BOA.getRegion();
      const stackName = BOA.getStackName();
      const dsqlEndpoint = CLIBridge.getDsqlEndpoint(cfg);
      const userPoolId = CLIBridge.getUserPoolId(cfg);
      const clientId = CLIBridge.getClientId(cfg);
      const lambdaName = CLIBridge.getLambdaName(cfg);
      const apiUrl = CLIBridge.getApiUrl(cfg);
      const bucket = CLIBridge.getBucketName(cfg);

      el.innerHTML = `
        <div class="page-header">
          <h1>${BOA.escapeHtml(stackName)}</h1>
          <p><span class="status-dot green"></span>Region: ${BOA.escapeHtml(region)}</p>
        </div>

        <!-- Service cards -->
        <div class="section-header">
          <span class="section-icon">\u2302</span>
          <h2>Services</h2>
        </div>
        <div class="cards-grid">
          ${serviceCard('Database', 'Aurora DSQL', dsqlEndpoint, 'database.html')}
          ${serviceCard('Auth', 'Amazon Cognito', userPoolId || 'Not configured', 'auth.html')}
          ${serviceCard('Compute', 'AWS Lambda', lambdaName || 'Not configured', 'functions.html')}
          ${serviceCard('API', 'API Gateway', apiUrl || 'Not configured', 'api.html')}
          ${serviceCard('Storage', 'Amazon S3', bucket || 'Not configured', 'storage.html')}
        </div>

        <!-- Quick commands -->
        <div class="section-header">
          <span class="section-icon">\u26A1</span>
          <h2>Quick Commands</h2>
        </div>
        <div class="command-list">
          ${dsqlEndpoint ? BOA.commandBlockHtml({
            title: 'Connect to database',
            description: 'Open psql session to your DSQL cluster',
            command: CLIBridge.getDsqlCommands(cfg)[0]?.command || '',
          }) : ''}
          ${userPoolId ? BOA.commandBlockHtml({
            title: 'List Cognito users',
            description: 'Show all registered users',
            command: 'aws cognito-idp list-users \\\n  --user-pool-id ' + userPoolId + ' \\\n  --region ' + region,
          }) : ''}
          ${lambdaName ? BOA.commandBlockHtml({
            title: 'Tail Lambda logs',
            description: 'Stream logs in real-time',
            command: 'aws logs tail "/aws/lambda/' + lambdaName + '" \\\n  --follow \\\n  --region ' + region,
          }) : ''}
          ${apiUrl ? BOA.commandBlockHtml({
            title: 'Test API endpoint',
            description: 'Quick GET request to your API',
            command: 'curl -s ' + apiUrl + '/ | jq .',
          }) : ''}
          ${bucket ? BOA.commandBlockHtml({
            title: 'List S3 objects',
            description: 'Show files in your bucket',
            command: 'aws s3 ls s3://' + bucket + '/ --region ' + region,
          }) : ''}
        </div>
      `;
    }

    function serviceCard(label, service, value, href) {
      const configured = value && value !== 'Not configured';
      return `
        <div class="card">
          <div class="card-header">
            <span class="card-label">${label}</span>
            <span class="status-dot ${configured ? 'green' : 'gray'}"></span>
          </div>
          <div class="card-title">${service}</div>
          <div class="card-value">${BOA.escapeHtml(value || 'Not configured')}</div>
          <a href="${href}" class="card-link">View details \u2192</a>
        </div>
      `;
    }
  </script>
</body>
</html>
