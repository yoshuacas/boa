<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOA Dashboard — Storage (S3)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content" id="pageContent"></main>
    </div>
  </div>

  <script src="js/dashboard-core.js"></script>
  <script src="js/aws-cli-bridge.js"></script>
  <script>
    BOA.init({
      activePage: 'storage',
      pageTitle: 'Storage (S3)',
      onConfig: renderStorage,
    });

    function renderStorage(cfg) {
      const el = document.getElementById('pageContent');

      if (!cfg) {
        BOA.renderGettingStarted(el);
        return;
      }

      const bucket = CLIBridge.getBucketName(cfg);
      const region = BOA.getRegion();

      if (!bucket) {
        el.innerHTML = `
          <div class="page-header">
            <h1>Storage (S3)</h1>
            <p>No S3 bucket found in your config.</p>
          </div>
          <div class="callout callout-warning">
            <p>
              Your <code>.boa/config.json</code> does not include an S3 bucket name.
              Make sure your bootstrap has completed and the config contains an
              <strong>s3_bucket</strong> or <strong>storage.bucket</strong> field.
            </p>
          </div>
        `;
        return;
      }

      const commands = CLIBridge.getS3Commands(cfg);

      el.innerHTML = `
        <div class="page-header">
          <h1>Storage (S3)</h1>
          <p>Amazon S3 &mdash; File storage with presigned URL uploads</p>
        </div>

        <!-- Hero card -->
        <div class="detail-hero">
          <div class="detail-service">Amazon S3</div>
          <div class="detail-title">${BOA.escapeHtml(bucket)}</div>
          <div class="detail-info">
            <div>
              <div class="info-row">
                <span class="info-label">Bucket name</span>
                <span class="info-value">${BOA.escapeHtml(bucket)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Region</span>
                <span class="info-value">${BOA.escapeHtml(region)}</span>
              </div>
            </div>
            <div>
              <div class="info-row">
                <span class="info-label">Access</span>
                <span class="info-value">Private (presigned URLs only)</span>
              </div>
              <div class="info-row">
                <span class="info-label">ARN</span>
                <span class="info-value">arn:aws:s3:::${BOA.escapeHtml(bucket)}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Commands -->
        <div class="section-header">
          <span class="section-icon">\u2601</span>
          <h2>S3 Commands</h2>
        </div>
        <div class="command-list">
          ${commands.map(c => BOA.commandBlockHtml(c)).join('')}
        </div>

        <!-- Tips -->
        <div class="callout callout-success">
          <p>
            <strong>Tip:</strong> BOA configures S3 buckets as fully private.
            Files are accessed exclusively through presigned URLs generated by your Lambda
            function. This prevents accidental public exposure of user data. The presigned
            URLs expire after 1 hour by default.
          </p>
        </div>

        ${BOA.commandBlockHtml({
          title: 'Upload a test file',
          description: 'Upload a file to the bucket from your terminal',
          command: `echo "Hello from BOA" > /tmp/test-upload.txt\n\naws s3 cp /tmp/test-upload.txt s3://${bucket}/test/test-upload.txt \\\\\n  --region ${region}\n\n# Verify it was uploaded\naws s3 ls s3://${bucket}/test/ --region ${region}`,
        })}
      `;
    }
  </script>
</body>
</html>
