<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOA Dashboard — API Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <header class="topbar"></header>
      <main class="page-content" id="pageContent"></main>
    </div>
  </div>

  <script src="js/dashboard-core.js"></script>
  <script src="js/aws-cli-bridge.js"></script>
  <script>
    BOA.init({
      activePage: 'api',
      pageTitle: 'API Gateway',
      onConfig: renderApi,
    });

    function renderApi(cfg) {
      const el = document.getElementById('pageContent');

      if (!cfg) {
        BOA.renderGettingStarted(el);
        return;
      }

      const apiUrl = CLIBridge.getApiUrl(cfg);
      const apiId = CLIBridge.getApiId(cfg);
      const region = BOA.getRegion();

      if (!apiUrl && !apiId) {
        el.innerHTML = `
          <div class="page-header">
            <h1>API Gateway</h1>
            <p>No API Gateway found in your config.</p>
          </div>
          <div class="callout callout-warning">
            <p>
              Your <code>.boa/config.json</code> does not include an API Gateway URL or ID.
              Make sure your bootstrap has completed and the config contains an
              <strong>api_url</strong> or <strong>api.url</strong> field.
            </p>
          </div>
        `;
        return;
      }

      const commands = CLIBridge.getApiGatewayCommands(cfg);
      const stage = cfg.api_stage || cfg.api?.stage || 'prod';

      el.innerHTML = `
        <div class="page-header">
          <h1>API Gateway</h1>
          <p>Amazon API Gateway &mdash; Managed REST API with Cognito authorization</p>
        </div>

        <!-- Hero card -->
        <div class="detail-hero">
          <div class="detail-service">API Gateway (REST)</div>
          <div class="detail-title">API Configuration</div>
          <div class="detail-info">
            <div>
              ${apiUrl ? `
              <div class="info-row">
                <span class="info-label">API URL</span>
                <span class="info-value">${BOA.escapeHtml(apiUrl)}</span>
              </div>` : ''}
              ${apiId ? `
              <div class="info-row">
                <span class="info-label">API ID</span>
                <span class="info-value">${BOA.escapeHtml(apiId)}</span>
              </div>` : ''}
            </div>
            <div>
              <div class="info-row">
                <span class="info-label">Region</span>
                <span class="info-value">${BOA.escapeHtml(region)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">Stage</span>
                <span class="info-value">${BOA.escapeHtml(stage)}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Commands -->
        <div class="section-header">
          <span class="section-icon">\u21C4</span>
          <h2>API Commands</h2>
        </div>
        <div class="command-list">
          ${commands.map(c => BOA.commandBlockHtml(c)).join('')}
        </div>

        <!-- Tip -->
        <div class="callout">
          <p>
            <strong>Note:</strong> API Gateway endpoints that use a Cognito authorizer require
            an <code>Authorization: Bearer &lt;token&gt;</code> header. Use the authenticated
            test command above to get a token from Cognito and call protected routes.
            Public routes (if any) can be tested with a simple <code>curl</code>.
          </p>
        </div>
      `;
    }
  </script>
</body>
</html>
