AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOA E2E test — Soccer league app with custom functions

Parameters:
  ProjectName:
    Type: String
    Description: Prefix for all resource names
    Default: boa-e2e-test
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256

Resources:
  # ── Database ──
  DsqlCluster:
    Type: AWS::DSQL::Cluster
    Properties:
      DeletionProtectionEnabled: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ── Auth ──
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-user-pool'
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-pre-signup'
      Handler: index.handler
      InlineCode: |
        exports.handler = async (event) => {
          event.response.autoConfirmUser = true;
          event.response.autoVerifyEmail = true;
          return event;
        };

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ── API Gateway ──
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${ProjectName}-api'
      StageName: prod
      Auth:
        DefaultAuthorizer: BoaAuthorizer
        Authorizers:
          BoaAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              ReauthorizeEvery: 0
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,apikey,Prefer,Accept,x-client-info'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"

  # ── Authorizer ──
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-authorizer'
      Handler: authorizer.handler
      CodeUri: lambda-templates/
      MemorySize: 128
      Environment:
        Variables:
          JWT_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/jwt-secret}}'

  AuthorizerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  # ── Main API Lambda ──
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Handler: index.handler
      CodeUri: lambda-templates/
      Environment:
        Variables:
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'
          BUCKET_NAME: !Ref StorageBucket
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          JWT_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/jwt-secret}}'
          AUTH_PROVIDER: cognito
          POLICIES_PATH: ./policies
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Sub 'arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/${DsqlCluster}'
        - S3CrudPolicy:
            BucketName: !Ref StorageBucket
      Events:
        ProxyRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY
        ProxyPlus:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
        AuthProxy:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /auth/v1/{proxy+}
            Method: ANY
            Auth:
              Authorizer: NONE

  # ── Storage ──
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-storage-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3600

  # ── Custom Function: Stripe Webhook (no JWT) ──
  # Defined without SAM Events.Api to avoid circular dependency with the
  # Api resource's default authorizer. Route is wired via AWS::ApiGateway
  # resources below.
  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-stripe-webhook'
      Handler: index.handler
      CodeUri: functions/stripe-webhook/
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Sub '{{resolve:ssm:/${ProjectName}/stripe-secret-key}}'
          STRIPE_WEBHOOK_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/stripe-webhook-secret}}'
          PROJECT_NAME: !Ref ProjectName
          SERVICE_ROLE_KEY: !Sub '{{resolve:ssm:/${ProjectName}/service-role-key}}'
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'

  StripeWebhookPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt StripeWebhookFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/POST/functions/v1/stripe-webhook'

  StripeWebhookResource1:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !GetAtt Api.RootResourceId
      PathPart: functions

  StripeWebhookResource2:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !Ref StripeWebhookResource1
      PathPart: v1

  StripeWebhookResource3:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !Ref StripeWebhookResource2
      PathPart: stripe-webhook

  StripeWebhookMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref StripeWebhookResource3
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${StripeWebhookFunction.Arn}/invocations'

  # ── Custom Function: Daily Stats Summary (scheduled) ──
  # Note: API_URL is NOT set here via !Sub ${Api} to avoid circular dependency.
  # The function reads it from SSM or .boa/config.json at runtime.
  DailyStatsSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-daily-stats-summary'
      Handler: index.handler
      CodeUri: functions/daily-stats-summary/
      Timeout: 60
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          SERVICE_ROLE_KEY: !Sub '{{resolve:ssm:/${ProjectName}/service-role-key}}'
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Sub 'arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/*'
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 0 * * ? *)"
            Description: "Nightly daily stats summary"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  BucketName:
    Description: S3 storage bucket name
    Value: !Ref StorageBucket
  DsqlEndpoint:
    Description: Aurora DSQL cluster endpoint
    Value: !GetAtt DsqlCluster.Endpoint
