AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOA — Backend on AWS serverless stack (CloudFront, WAF, Aurora DSQL, Cognito, Lambda, S3)

Parameters:
  ProjectName:
    Type: String
    Description: Prefix for all resource names
    Default: boa-app
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only
  ApiBaseUrl:
    Type: String
    Description: Public base URL for OpenAPI spec (e.g. https://d111.cloudfront.net/rest/v1)
    Default: ''

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256

Conditions:
  IsUsEast1: !Equals [!Ref 'AWS::Region', 'us-east-1']
  HasApiBaseUrl: !Not [!Equals [!Ref ApiBaseUrl, '']]

Resources:
  # -------------------------------------------------------
  # Database — Aurora DSQL (serverless PostgreSQL-compatible)
  # -------------------------------------------------------
  DsqlCluster:
    Type: AWS::DSQL::Cluster
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DeletionProtectionEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -------------------------------------------------------
  # Auth — Amazon Cognito
  # -------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${ProjectName}-user-pool'
      DeletionProtection: ACTIVE
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  # -------------------------------------------------------
  # Pre-Signup Lambda trigger — auto-confirms users
  # -------------------------------------------------------
  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-pre-signup'
      Handler: index.handler
      InlineCode: |
        exports.handler = async (event) => {
          event.response.autoConfirmUser = true;
          event.response.autoVerifyEmail = true;
          return event;
        };

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # -------------------------------------------------------
  # Compute — Lambda API function
  # -------------------------------------------------------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Handler: index.handler
      CodeUri: ./lambda/
      ReservedConcurrentExecutions: 50
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'
          BUCKET_NAME: !Ref StorageBucket
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          JWT_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/jwt-secret}}'
          ORIGIN_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/origin-secret}}'
          AUTH_PROVIDER: cognito
          POLICIES_PATH: ./policies
          API_BASE_URL: !If
            - HasApiBaseUrl
            - !Ref ApiBaseUrl
            - !Ref 'AWS::NoValue'
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Sub 'arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/${DsqlCluster}'
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
                - cognito-idp:GetUser
                - cognito-idp:GlobalSignOut
                - cognito-idp:RevokeToken
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminRespondToAuthChallenge
                - cognito-idp:AdminConfirmSignUp
              Resource: !GetAtt UserPool.Arn
        - S3CrudPolicy:
            BucketName: !Ref StorageBucket

  # -------------------------------------------------------
  # Traffic layer — CloudFront + WAF (DoW protection)
  # -------------------------------------------------------
  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${ProjectName}-api-cache'
        DefaultTTL: 60
        MaxTTL: 60
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Authorization
              - apikey
          QueryStringsConfig:
            QueryStringBehavior: all
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  # Uses managed AllViewerExceptHostHeader policy to forward all
  # viewer headers (including Origin and CORS preflight headers)
  # to the Lambda origin, except Host (which would break Function URL auth).

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${ProjectName} API'
        DefaultCacheBehavior:
          TargetOriginId: lambda-origin
          ViewerProtocolPolicy: https-only
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - PATCH
            - POST
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref CloudFrontCachePolicy
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          Compress: true
        Origins:
          - Id: lambda-origin
            DomainName: !Select
              - 2
              - !Split ['/', !GetAtt ApiFunctionUrl.FunctionUrl]
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
            OriginCustomHeaders:
              - HeaderName: x-origin-verify
                HeaderValue: !Sub '{{resolve:ssm:/${ProjectName}/origin-secret}}'
        WebACLId: !If
          - IsUsEast1
          - !GetAtt WafWebAcl.Arn
          - !Ref 'AWS::NoValue'
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  ApiFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  ApiFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunction
      Principal: '*'

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: IsUsEast1
    Properties:
      Name: !Sub '${ProjectName}-waf'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ProjectName}-waf'
      Rules:
        - Name: rate-limit
          Priority: 1
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-rate-limit'
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
        - Name: ip-reputation
          Priority: 2
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-ip-reputation'
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList

  ThrottleAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-throttle-alarm'

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-api-throttled'
      AlarmDescription: >-
        API function is being throttled. This may indicate
        a traffic spike or denial-of-wallet attack.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Sub '${ProjectName}-api'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ThrottleAlarmTopic

  # -------------------------------------------------------
  # Storage — S3 bucket (private, CORS for presigned URLs)
  # -------------------------------------------------------
  StorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-storage-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3600

Outputs:
  ApiFunctionUrl:
    Description: Lambda Function URL (internal, behind CloudFront)
    Value: !GetAtt ApiFunctionUrl.FunctionUrl

  CloudFrontUrl:
    Description: CloudFront distribution URL (primary API endpoint)
    Value: !Sub >-
      https://${CloudFrontDistribution.DomainName}

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  BucketName:
    Description: S3 storage bucket name
    Value: !Ref StorageBucket

  DsqlEndpoint:
    Description: Aurora DSQL cluster endpoint
    Value: !GetAtt DsqlCluster.Endpoint

  ThrottleAlarmTopicArn:
    Description: SNS topic for Lambda throttle alarms
    Value: !Ref ThrottleAlarmTopic
