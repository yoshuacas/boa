AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOA - Backend on AWS serverless stack (API Gateway, WAF, Aurora DSQL, Lambda, S3)

Parameters:
  ProjectName:
    Type: String
    Description: Prefix for all resource names
    Default: boa-app
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256

Resources:
  # -------------------------------------------------------
  # Database — Aurora DSQL (serverless PostgreSQL-compatible)
  # -------------------------------------------------------
  DsqlCluster:
    Type: AWS::DSQL::Cluster
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DeletionProtectionEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -------------------------------------------------------
  # Compute — Lambda API function
  # -------------------------------------------------------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Handler: index.handler
      CodeUri: ./lambda/
      Environment:
        Variables:
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'
          BUCKET_NAME: !Ref StorageBucket
          JWT_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/jwt-secret}}'
          BETTER_AUTH_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/better-auth-secret}}'
          BETTER_AUTH_URL: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
          AUTH_PROVIDER: better-auth
          POLICIES_PATH: ./policies
          API_BASE_URL: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod/rest/v1'
      Events:
        ProxyRoot:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY
        ProxyPlus:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Sub 'arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/${DsqlCluster}'
        - S3CrudPolicy:
            BucketName: !Ref StorageBucket

  # -------------------------------------------------------
  # Traffic layer — API Gateway REST + WAF
  # -------------------------------------------------------
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${ProjectName}-api'
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,apikey,Prefer,Accept,x-client-info,X-Client-Info,X-Supabase-Api-Version,content-profile,accept-profile'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,apikey,Prefer,Accept,x-client-info,X-Client-Info,X-Supabase-Api-Version,content-profile,accept-profile'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,apikey,Prefer,Accept,x-client-info,X-Client-Info,X-Supabase-Api-Version,content-profile,accept-profile'"

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${ProjectName}-waf'
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${ProjectName}-waf'
      Rules:
        - Name: rate-limit
          Priority: 1
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-rate-limit'
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
        - Name: ip-reputation
          Priority: 2
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${ProjectName}-ip-reputation'
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList

  WafApiGatewayAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Sub 'arn:aws:apigateway:${AWS::Region}::/restapis/${Api}/stages/prod'
      WebACLArn: !GetAtt WafWebAcl.Arn

  # -------------------------------------------------------
  # Storage — S3 bucket (private, CORS for presigned URLs)
  # -------------------------------------------------------
  StorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-storage-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3600

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'

  RestApiId:
    Description: API Gateway REST API ID
    Value: !Ref Api

  BucketName:
    Description: S3 storage bucket name
    Value: !Ref StorageBucket

  DsqlEndpoint:
    Description: Aurora DSQL cluster endpoint
    Value: !GetAtt DsqlCluster.Endpoint
