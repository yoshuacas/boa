AWSTemplateFormatVersion: '2010-09-09'
Description: BOA Studio Phase 1 — IAM role, Cognito user pool, and S3 buckets.

Parameters:

  # ── BOA backend ────────────────────────────────────────────
  BoaStackName:
    Type: String
    Description: Name of the BOA backend stack (e.g. boaapp). Used as the SSM path prefix.
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only.

  # ── Auth ───────────────────────────────────────────────────
  AuthMode:
    Type: String
    Description: Studio auth mode.
    AllowedValues: [token, cognito]
    Default: token

Conditions:
  IsCognitoMode: !Equals [!Ref AuthMode, 'cognito']

Resources:

  # ── Cognito — Studio admin user pool ───────────────────────
  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Condition: IsCognitoMode
    Properties:
      UserPoolName: !Sub 'boa-studio-admins-${BoaStackName}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      UserPoolTags:
        Project: !Sub 'boa-studio-${BoaStackName}'

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsCognitoMode
    Properties:
      ClientName: boa-studio
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── IAM — Lambda execution role ────────────────────────────
  StudioLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'boa-studio-lambda-role-${BoaStackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: boa-studio-permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DsqlConnect
                Effect: Allow
                Action:
                  - dsql:DbConnectAdmin
                Resource: '*'
              - Sid: LambdaReadWrite
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:ListFunctions
                  - lambda:InvokeFunction
                Resource: '*'
              - Sid: CloudFormationRead
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:CreateLogDelivery
                  - logs:FilterLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Sid: SSMConfigRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*'
              - Sid: S3ObjectAccess
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: '*'
              - Sid: CognitoAdmin
                Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminResetUserPassword
                Resource: !If
                  - IsCognitoMode
                  - !GetAtt AdminUserPool.Arn
                  - '*'
      Tags:
        - Key: Project
          Value: !Sub 'boa-studio-${BoaStackName}'

  # ── S3 — Artifacts bucket (Lambda zip uploads) ─────────────
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'boa-studio-artifacts-${BoaStackName}-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Project
          Value: !Sub 'boa-studio-${BoaStackName}'

  # ── S3 — Static assets bucket (CloudFront origin) ──────────
  StaticBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'boa-studio-static-${BoaStackName}-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: !Sub 'boa-studio-${BoaStackName}'

Outputs:

  LambdaRoleArn:
    Description: IAM role ARN for the Studio Lambda execution role
    Value: !GetAtt StudioLambdaRole.Arn

  ArtifactsBucketName:
    Description: S3 bucket for Lambda zip artifacts
    Value: !Ref ArtifactsBucket

  StaticBucketName:
    Description: S3 bucket for CloudFront static assets
    Value: !Ref StaticBucket

  CognitoUserPoolId:
    Condition: IsCognitoMode
    Description: Cognito User Pool ID
    Value: !Ref AdminUserPool

  CognitoClientId:
    Condition: IsCognitoMode
    Description: Cognito App Client ID
    Value: !Ref AdminUserPoolClient
