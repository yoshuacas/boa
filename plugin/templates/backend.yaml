AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: BOA — Backend on AWS serverless stack (Aurora DSQL, Cognito, Lambda Function URL, S3)

Parameters:
  ProjectName:
    Type: String
    Description: Prefix for all resource names
    Default: boa-app
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 256

Resources:
  # -------------------------------------------------------
  # Database — Aurora DSQL (serverless PostgreSQL-compatible)
  # -------------------------------------------------------
  DsqlCluster:
    Type: AWS::DSQL::Cluster
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DeletionProtectionEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -------------------------------------------------------
  # Auth — Amazon Cognito
  # -------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${ProjectName}-user-pool'
      DeletionProtection: ACTIVE
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED

  # -------------------------------------------------------
  # Pre-Signup Lambda trigger — auto-confirms users
  # -------------------------------------------------------
  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-pre-signup'
      Handler: index.handler
      InlineCode: |
        exports.handler = async (event) => {
          event.response.autoConfirmUser = true;
          event.response.autoVerifyEmail = true;
          return event;
        };

  PreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt PreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # -------------------------------------------------------
  # Compute — Lambda API function
  # -------------------------------------------------------
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Handler: index.handler
      CodeUri: ../lambda-templates/
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowHeaders:
            - Content-Type
            - Authorization
            - apikey
            - Prefer
            - Accept
            - x-client-info
            - X-Client-Info
            - X-Supabase-Api-Version
            - content-profile
            - accept-profile
          AllowMethods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
          AllowOrigins:
            - '*'
          MaxAge: 600
      Environment:
        Variables:
          DSQL_ENDPOINT: !GetAtt DsqlCluster.Endpoint
          REGION_NAME: !Ref 'AWS::Region'
          BUCKET_NAME: !Ref StorageBucket
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          JWT_SECRET: !Sub '{{resolve:ssm:/${ProjectName}/jwt-secret}}'
          AUTH_PROVIDER: cognito
          POLICIES_PATH: ./policies
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dsql:DbConnect
                - dsql:DbConnectAdmin
              Resource: !Sub 'arn:aws:dsql:${AWS::Region}:${AWS::AccountId}:cluster/${DsqlCluster}'
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
                - cognito-idp:GetUser
                - cognito-idp:GlobalSignOut
                - cognito-idp:RevokeToken
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminInitiateAuth
                - cognito-idp:AdminRespondToAuthChallenge
                - cognito-idp:AdminConfirmSignUp
              Resource: !GetAtt UserPool.Arn
        - S3CrudPolicy:
            BucketName: !Ref StorageBucket

  # -------------------------------------------------------
  # Function URL permission — required since October 2025
  # SAM v1.101.0+ auto-generates this, but older versions
  # do not. Explicit declaration is a safe no-op on new
  # SAM and a fix on old SAM.
  # -------------------------------------------------------
  ApiFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiFunction.Arn
      Action: lambda:InvokeFunction
      Principal: '*'
      InvokedViaFunctionUrl: true

  # -------------------------------------------------------
  # Storage — S3 bucket (private, CORS for presigned URLs)
  # -------------------------------------------------------
  StorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-storage-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - '*'
            MaxAge: 3600

Outputs:
  ApiFunctionUrl:
    Description: Lambda Function URL endpoint
    Value: !GetAtt ApiFunctionUrl.FunctionUrl

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  BucketName:
    Description: S3 storage bucket name
    Value: !Ref StorageBucket

  DsqlEndpoint:
    Description: Aurora DSQL cluster endpoint
    Value: !GetAtt DsqlCluster.Endpoint
