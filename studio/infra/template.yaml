AWSTemplateFormatVersion: '2010-09-09'
Description: BOA Studio — IAM role and Cognito user pool. The Amplify app is created via CLI (no GitHub token required for public repos).

Parameters:

  # ── BOA backend ────────────────────────────────────────────
  BoaStackName:
    Type: String
    Description: Name of the BOA backend stack (e.g. boaapp). Used as the SSM path prefix.
    AllowedPattern: '[a-z0-9\-]+'
    ConstraintDescription: Lowercase alphanumeric characters and hyphens only.

  # ── Auth ───────────────────────────────────────────────────
  AuthMode:
    Type: String
    Description: Studio auth mode.
    AllowedValues: [token, cognito]
    Default: token

  SessionSecret:
    Type: String
    Description: Secret used to sign session cookies. Generate with "openssl rand -hex 32".
    NoEcho: true

  AccessToken:
    Type: String
    Description: (Token mode only) Shared password for Studio login. Generate with "openssl rand -hex 24".
    NoEcho: true
    Default: ''

Conditions:
  IsTokenMode:   !Equals [!Ref AuthMode, 'token']
  IsCognitoMode: !Equals [!Ref AuthMode, 'cognito']

Resources:

  # ── Cognito — Studio admin user pool ───────────────────────
  AdminUserPool:
    Type: AWS::Cognito::UserPool
    Condition: IsCognitoMode
    Properties:
      UserPoolName: !Sub 'boa-studio-admins-${BoaStackName}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      UserPoolTags:
        Project: !Sub 'boa-studio-${BoaStackName}'

  AdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsCognitoMode
    Properties:
      ClientName: boa-studio
      UserPoolId: !Ref AdminUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ── IAM — Amplify service role ──────────────────────────────
  # Used as both the CodeBuild IAM role (fetches SSM config at build time)
  # and the SSR Lambda execution role (ComputeRoleArn, set via CLI after
  # Amplify app creation). Without ComputeRoleArn, AWS SDK calls in the
  # SSR Lambda fail with "no credentials".
  AmplifyServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'boa-studio-amplify-role-${BoaStackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - amplify.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: boa-studio-permissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DsqlConnect
                Effect: Allow
                Action:
                  - dsql:DbConnectAdmin
                Resource: '*'
              - Sid: LambdaReadWrite
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                  - lambda:ListFunctions
                  - lambda:InvokeFunction
                Resource: '*'
              - Sid: CloudFormationRead
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:CreateLogDelivery
                  - logs:FilterLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Sid: SSMConfigRead
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*'
              - Sid: S3ObjectAccess
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: '*'
              - Sid: CognitoAdmin
                Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminResetUserPassword
                Resource: !If
                  - IsCognitoMode
                  - !GetAtt AdminUserPool.Arn
                  - '*'
      Tags:
        - Key: Project
          Value: !Sub 'boa-studio-${BoaStackName}'

Outputs:

  AmplifyRoleArn:
    Description: IAM role ARN for the Amplify service role (used as both IAMServiceRole and ComputeRoleArn)
    Value: !GetAtt AmplifyServiceRole.Arn

  CognitoUserPoolId:
    Condition: IsCognitoMode
    Description: Cognito User Pool ID
    Value: !Ref AdminUserPool

  CognitoClientId:
    Condition: IsCognitoMode
    Description: Cognito App Client ID
    Value: !Ref AdminUserPoolClient
